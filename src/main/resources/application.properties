# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8080
spring.application.name=trading-journal

# ===============================
# CONEXIÓN A POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/trading_journal_db
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE HIBERNATE (JPA)
# ===============================
# 'validate' asegura que las tablas en Java coincidan con las de SQL sin borrarlas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# OBSERVABILIDAD Y MÉTRICAS (ACTUATOR)
# ===============================
management.endpoints.web.exposure.include=health,metrics

# ===============================
# CONFIGURACIÓN DE SEGURIDAD JWT
# ===============================
# El secreto debe ser una cadena larga y compleja (mínimo 256 bits / 32 caracteres)
application.security.jwt.secret-key=GomezCapitalSaaS_SuperSecreto_ExtremadamenteLargo_2026!
# Tiempo de expiración en milisegundos (86400000 ms = 24 horas)
application.security.jwt.expiration=86400000

# ===============================
# CONFIGURACIÓN MULTIMEDIA
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
