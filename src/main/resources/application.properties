# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
# Railway nos asignará un puerto dinámico. Si estamos en local, usa el 8080.
server.port=${PORT:8080}

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (POSTGRESQL)
# ===============================
# Leerá las variables mágicas de Railway, pero si estás en local, usa tus credenciales de abajo tras los ':'
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/trading_journal}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:tu_contraseña_local}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# IMPORTANTE: Lo dejamos en 'update' para que cree las tablas la primera vez en la nube sin borrar datos futuros
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# CONFIGURACIÓN DE SEGURIDAD (JWT)
# ===============================
jwt.secret=${JWT_SECRET:UnaClaveSecretaMuyLargaYSeguraParaDesarrolloLocal12345!}
jwt.expiration=86400000

# ===============================
# CONFIGURACIÓN DE ALMACENAMIENTO (Temporal)
# ===============================
# Por ahora usaremos una carpeta temporal de Railway hasta que hagamos el Paso 3 (Cloudinary)
file.upload-dir=/tmp/uploads/trades